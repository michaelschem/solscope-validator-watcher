name: Publish to PyPI

# Publishes on a GitHub Release, or manually via the "Run workflow" button.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      # When triggered by a release, make sure the tag matches the package version
      # so we never publish a mismatched version under a tag.
      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "Package version: $PKG_VERSION"
          echo "Release tag:     $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match pyproject version '$PKG_VERSION'."
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
